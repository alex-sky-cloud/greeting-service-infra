# =============================================================================
# secret-template.yaml
#
# ВАЖНО: этот файл — шаблон. Реальный Secret НЕ коммитится в репозиторий.
# Создайте Secret вручную командой:
#
#   kubectl create secret generic greeting-service-secret \
#     --namespace=prod \
#     --from-literal=DB_URL="jdbc:postgresql://10.10.0.5:5432/greeting_db" \
#     --from-literal=DB_USERNAME="greeting_user" \
#     --from-literal=DB_PASSWORD="your_password"
#
# Либо через sealed-secrets или external-secrets-operator (для prod).
# =============================================================================

# Ниже — пример структуры Secret для понимания формата.
# НЕ ИСПОЛЬЗУЙТЕ этот файл напрямую — значения в base64 здесь фиктивные.
apiVersion: v1
kind: Secret
metadata:
  name: greeting-service-secret
  namespace: prod
type: Opaque
data:
  # echo -n "значение" | base64
  DB_URL: amRiYzpwb3N0Z3Jlc3FsOi8vMTAuMTAuMC41OjU0MzIvZ3JlZXRpbmdfZGI=
  DB_USERNAME: Z3JlZXRpbmdfdXNlcg==
  DB_PASSWORD: Y2hhbmdlX21l

# =============================================================================
# registry-secret.yaml — шаблон для создания imagePullSecret.
#
# Kubernetes использует этот Secret, чтобы pull Docker image
# из приватного реестра (Docker Registry на вашем devtools-сервере).
#
# Создать командой (предпочтительно):
#   kubectl create secret docker-registry registry-credentials \
#     --namespace=prod \
#     --docker-server=registry.example.com \
#     --docker-username=your_registry_user \
#     --docker-password=your_registry_password
#
# Если нужно создать в нескольких namespace сразу:
#   for ns in dev stage prod; do
#     kubectl create secret docker-registry registry-credentials \
#       --namespace=$ns \
#       --docker-server=registry.example.com \
#       --docker-username=your_registry_user \
#       --docker-password=your_registry_password
#   done
# =============================================================================

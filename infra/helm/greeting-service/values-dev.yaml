# =============================================================================
# values-dev.yaml — переопределения для окружения dev.
# Применяется командой:
#   helm upgrade --install greeting-service ./greeting-service \
#     -f values.yaml -f values-dev.yaml \
#     --namespace dev --create-namespace
# =============================================================================

replicaCount: 1

image:
  tag: "dev-latest"

ingress:
  host: greeting-dev.example.com

env:
  APP_ENV: "dev"
  APP_VERSION: "dev"

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"
